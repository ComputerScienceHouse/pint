# Local kind cluster overrides.
# Apply with: helm upgrade --install pint chart/ -f chart/values-dev.yaml -n pint --create-namespace

# Run PINT as a local process (make dev) rather than in the cluster.
pint:
  enabled: false
  image:
    tag: dev
    pullPolicy: Never

# Stub config values for dev; PINT itself runs locally so these are unused,
# but they keep 'helm lint' and 'helm template' happy.
config:
  radSecProxyProtocol: false
  clientID: pint-dev
  serverURL: http://localhost:8080
  ipaHost: localhost:8088
  ipaServiceAccount: pint
  ipaWirelessCAName: wireless
  ipaRadSecCAName: radsec
  ipaRootCAName: ipa
  ipaSkipTLSVerify: true
  wifiSSID: CSH
  radiusServer: localhost:2083

freeradius:
  image:
    tag: dev
    pullPolicy: Never
  service:
    type: NodePort
    nodePort: 32083
  statusServer:
    enabled: true
    clientCIDR: "0.0.0.0/0"
    nodePort: 31181
  agentCheck:
    nodePort: 32084
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
