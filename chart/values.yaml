nameOverride: ""
fullnameOverride: ""

serviceAccount:
  name: ""  # defaults to fullname

# PINT web application.
# Set enabled=false in dev to run PINT as a local process (make dev) instead.
pint:
  enabled: true
  image:
    repository: pint
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

# Non-sensitive PINT application configuration rendered into a ConfigMap.
# Sensitive values (PINT_CLIENT_SECRET, PINT_IPA_PASSWORD) must still be
# provided in the Secret named by envSecret below.
config:
  # OIDC
  clientID: ""
  serverURL: ""

  # FreeIPA
  ipaHost: ""
  ipaServiceAccount: ""
  ipaWirelessCAName: "wireless"
  ipaRadSecCAName: "radsec"
  ipaRootCAName: "ipa"
  ipaCertProfile: "pint_wifi"
  ipaRadSecClientCertProfile: "pint_radsec_client"
  ipaRadSecServerCertProfile: "pint_radsec_server"
  ipaSkipTLSVerify: false

  # RADIUS / RadSec
  radSecCheckCRL: true          # set false to disable CRL checking in the RadSec TLS listener
  radSecProxyProtocol: false    # set true when HAProxy fronts FreeRADIUS and sends PROXY protocol headers
  radSecStatusPort: ""          # overrides the FreeRADIUS status server port (default: 18121)
  radSecStatusAddr: ""          # overrides the status server address (host:port); useful in dev when pod IPs are unreachable

  # iOS mobileconfig signing
  codeSigningCAName: "code_signing"
  codeSigningCertProfile: ""    # default: pint_profile_signing

  # WiFi
  wifiSSID: "CSH"

  # RADIUS
  radiusServer: ""

# Pre-existing Secret containing sensitive PINT credentials.
# Required when pint.enabled=true. Must contain only:
#   PINT_CLIENT_SECRET  - OIDC client secret
#   PINT_IPA_PASSWORD   - FreeIPA service account password
# All other config is rendered into a ConfigMap from the config block above.
# Defaults to "<fullname>" (i.e. the Helm release name) when left empty.
envSecret: ""

# Names of the K8s Secrets PINT creates and manages at runtime.
# These are referenced consistently across the Role, PINT env vars, and
# FreeRADIUS volume mounts. All names default to "<fullname>-<suffix>" so
# multiple releases in the same namespace never collide. Override only when
# you need to share a secret between releases.
secrets:
  config:              ""  # default: <fullname>-config  (clients.json, clients.conf, status-secret, status)
  radSecCert:          ""  # default: <fullname>-radsec-server-certificates  (tls.crt, tls.key, ca.pem, wifi-ca.pem)
  eapCert:             ""  # default: <fullname>-eap-server-cert  (eap.crt, eap.key); wireless CA-issued, verified by iOS devices
  profileSigningCert:  ""  # default: <fullname>-profile-signing-cert  (tls.crt, tls.key)
  scepRACert:          ""  # default: <fullname>-scep-ra-cert  (tls.crt, tls.key); auto-generated on first startup
  deviceMap:           ""  # default: <fullname>-device-map  (device-map.json); auto-created on first SCEP enrollment

service:
  type: ClusterIP
  port: 80

# FreeRADIUS: RadSec server mounted by home routers.
freeradius:
  enabled: true
  image:
    repository: pint-freeradius
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    nodePort: null
    externalTrafficPolicy: Local  # Local preserves the client's real IP; required when using HAProxy PROXY protocol
  # FreeRADIUS status virtual server — used by PINT to surface per-pod auth statistics.
  # Managed automatically by PINT at startup.
  statusServer:
    enabled: true
    clientCIDR: "0.0.0.0/0"  # CIDR allowed to query the status server; restrict to pod CIDR in production
    nodePort: null  # set to expose status port via NodePort (dev only; PINT queries pods directly in prod)
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

# OpenShift-specific resources.
openshift:
  enabled: false
  route:
    host: ""
