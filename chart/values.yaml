nameOverride: ""
fullnameOverride: ""

serviceAccount:
  name: ""  # defaults to fullname

# PINT web application.
# Set enabled=false in dev to run PINT as a local process (make dev) instead.
pint:
  enabled: true
  image:
    repository: pint
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

# Non-sensitive PINT application configuration rendered into a ConfigMap.
# Sensitive values (PINT_CLIENT_SECRET, PINT_IPA_PASSWORD) must still be
# provided in the Secret named by envSecret below.
config:
  # OIDC
  clientID: ""
  serverURL: ""

  # FreeIPA
  ipaHost: ""
  ipaServiceAccount: ""
  ipaCAName: "ipa"
  ipaRadSecCAName: "radsec"
  ipaRootCAName: "ipa"
  ipaCertProfile: "pint_wifi"
  ipaRadSecClientCertProfile: "pint_radsec_client"
  ipaRadSecServerCertProfile: "pint_radsec_server"
  ipaSkipTLSVerify: false

  # WiFi
  wifiSSID: "CSH"

  # RADIUS
  radiusServer: ""

# Pre-existing Secret containing sensitive PINT credentials.
# Required when pint.enabled=true. Must contain only:
#   PINT_CLIENT_SECRET  - OIDC client secret
#   PINT_IPA_PASSWORD   - FreeIPA service account password
# All other config is rendered into a ConfigMap from the config block above.
envSecret: pint-env

# Names of the K8s Secrets PINT creates and manages at runtime.
# These are referenced consistently across the Role, PINT env vars, and
# FreeRADIUS volume mounts - change all three if you rename them.
secrets:
  radiusClients: pint-radius-clients
  radiusConfig:  pint-radius-config
  radSecCert:    pint-radsec-server

service:
  type: ClusterIP
  port: 80

# FreeRADIUS: RadSec server mounted by home routers.
freeradius:
  enabled: true
  image:
    repository: pint-freeradius
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    nodePort: null  # only used when type=NodePort
  checkCRL: true
  # FreeRADIUS status virtual server — used by PINT to surface per-pod auth statistics.
  # Managed automatically by PINT at startup.
  statusServer:
    enabled: true
    clientCIDR: "0.0.0.0/0"  # CIDR allowed to query the status server; restrict to pod CIDR in production
    nodePort: null  # UDP NodePort for status server; only used when freeradius.service.type=NodePort
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

# OpenShift-specific resources.
openshift:
  enabled: false
  route:
    host: ""
