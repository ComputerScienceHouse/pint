{{- if .Values.freeradius.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pint.freeradiusFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pint.freeradiusLabels" . | nindent 4 }}
spec:
  type: {{ .Values.freeradius.service.type }}
  selector:
    {{- include "pint.freeradiusSelectorLabels" . | nindent 4 }}
  ports:
    - port: 2083
      targetPort: radsec
      name: radsec
      {{- if and (eq .Values.freeradius.service.type "NodePort") .Values.freeradius.service.nodePort }}
      nodePort: {{ .Values.freeradius.service.nodePort }}
      {{- end }}
    {{- if and .Values.freeradius.statusServer.enabled .Values.freeradius.statusServer.nodePort }}
    - port: 18121
      targetPort: status
      protocol: UDP
      name: status
      nodePort: {{ .Values.freeradius.statusServer.nodePort }}
    {{- end }}
{{- end }}
