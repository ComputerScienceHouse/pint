apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pint.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pint.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ include "pint.secretName.config" . | quote }}
      - {{ include "pint.secretName.radSecCert" . | quote }}
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - {{ include "pint.freeradiusFullname" . | quote }}
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["list"]
