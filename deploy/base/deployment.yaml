apiVersion: apps/v1
kind: Deployment
metadata:
  name: pint
  namespace: pint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pint
  template:
    metadata:
      labels:
        app: pint
    spec:
      serviceAccountName: pint
      containers:
        - name: pint
          image: pint:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: pint-env
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
