apiVersion: v1
kind: ServiceAccount
metadata:
  name: pint
  namespace: pint
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pint
  namespace: pint
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["pint-radius-clients", "pint-radius-config", "pint-radsec-server"]
    verbs: ["get", "create", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pint
  namespace: pint
subjects:
  - kind: ServiceAccount
    name: pint
    namespace: pint
roleRef:
  kind: Role
  name: pint
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pint
  namespace: pint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pint
  template:
    metadata:
      labels:
        app: pint
    spec:
      serviceAccountName: pint
      containers:
        - name: pint
          image: pint:dev
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: pint-env
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pint
  namespace: pint
spec:
  selector:
    app: pint
  ports:
    - port: 80
      targetPort: 8080
