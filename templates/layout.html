<!-- templates/layout.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>PINT | {{block "title" .}}CSH WiFi{{end}}</title>
    <link rel="stylesheet" href="https://s3.csh.rit.edu/csh-material-bootstrap/4.3.1/dist/csh-material-bootstrap.min.css" media="screen">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
</head>
<body>
<nav class="navbar navbar-expand-sm navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">
            <span class="mdi mdi-beer"></span> PINT
            <div style="font-size: 0.6em; opacity: 0.75; line-height: 1; margin-top: -2px;">Pouring IPA for Network Trust</div>
        </a>
        {{if .Username}}
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarUser"
                aria-controls="navbarUser" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarUser">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center" href="#"
                       id="navUserDropdown" role="button"
                       data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <img src="{{.AvatarURL}}" class="rounded-circle mr-2"
                             width="28" height="28" alt="{{.Username}}">
                        {{if .FullName}}{{.FullName}}{{else}}{{.Username}}{{end}}
                    </a>
                    <div class="dropdown-menu dropdown-menu-right" aria-labelledby="navUserDropdown">
                        <a class="dropdown-item" href="/auth/logout">
                            <span class="mdi mdi-logout"></span> Logout
                        </a>
                    </div>
                </li>
            </ul>
        </div>
        {{end}}
    </div>
</nav>
<div class="container mt-4">
    {{block "content" .}}{{end}}
</div>
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
{{block "scripts" .}}{{end}}
</body>
</html>
