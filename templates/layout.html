<!-- templates/layout.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PINT | {{block "title" .}}CSH WiFi{{end}}</title>
    <link rel="stylesheet" href="https://assets.csh.rit.edu/csh-material-bootstrap/5.3.8/dist/css/bootstrap.min.css" media="screen">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <style>
      /* ── Design tokens ──────────────────────────────────────────
         Light values reference Bootstrap CSS vars.
         Dark values are overridden in the media query below.     */
      :root {
        --pint-code-color:        #6c757d;
        --pint-code-bg:           #f8f9fa;
        --pint-alt-header-bg:     #f8f9fa;
        --pint-alt-header-color:  #212529;
        --pint-alt-header-border: #dee2e6;
        --pint-surface:           #fff;
        --pint-surface-raised:    #f8f9fa;
        --pint-border:            #dee2e6;
        --pint-text:              #212529;
        --pint-muted:             #6c757d;
        --pint-muted-strong:      #6c757d;
        --pint-input-bg:          #fff;
        --pint-input-bg-ro:       #f8f9fa;
        --pint-input-border:      #ced4da;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          /* Concrete dark values — don't rely on CSH bootstrap's --bs-* vars */
          --pint-body-bg:           #1e1e1e;
          --pint-code-color:        #adb5bd;
          --pint-code-bg:           #2a2a2a;
          --pint-alt-header-bg:     #2a2a2a;
          --pint-alt-header-color:  #e0e0e0;
          --pint-alt-header-border: #444;
          --pint-surface:           #2a2a2a;
          --pint-surface-raised:    #333;
          --pint-border:            rgba(255,255,255,.1);
          --pint-text:              #e0e0e0;
          --pint-muted:             #888;
          --pint-muted-strong:      #adb5bd;
          --pint-input-bg:          #2a2a2a;
          --pint-input-bg-ro:       #1e1e1e;
          --pint-input-border:      #555;
        }
      }

      /* ── Code elements ──────────────────────────────────────────
         Override Bootstrap 5's default pink with neutral style.  */
      code {
        color: var(--pint-code-color);
        background-color: var(--pint-code-bg);
        padding: .15em .45em;
        border-radius: .3rem;
        font-size: .875em;
      }

      /* ── Restore gray secondary buttons (CSH theme maps --bs-secondary to brand red) */
      .btn-secondary {
        --bs-btn-color:              #fff;
        --bs-btn-bg:                 #6c757d;
        --bs-btn-border-color:       #6c757d;
        --bs-btn-hover-color:        #fff;
        --bs-btn-hover-bg:           #5c636a;
        --bs-btn-hover-border-color: #565e64;
        --bs-btn-active-color:       #fff;
        --bs-btn-active-bg:          #565e64;
        --bs-btn-active-border-color:#51585e;
        --bs-btn-disabled-color:     #fff;
        --bs-btn-disabled-bg:        #6c757d;
        --bs-btn-disabled-border-color:#6c757d;
      }
      .btn-outline-secondary {
        --bs-btn-color:              #6c757d;
        --bs-btn-border-color:       #6c757d;
        --bs-btn-hover-color:        #fff;
        --bs-btn-hover-bg:           #6c757d;
        --bs-btn-hover-border-color: #6c757d;
        --bs-btn-active-color:       #fff;
        --bs-btn-active-bg:          #6c757d;
        --bs-btn-active-border-color:#6c757d;
        --bs-btn-disabled-color:     #6c757d;
        --bs-btn-disabled-border-color:#6c757d;
      }

      /* ── Custom components ──────────────────────────────────── */
      .platform-header-alt {
        background-color: var(--pint-alt-header-bg);
        border-bottom: 2px solid var(--pint-alt-header-border);
        color: var(--pint-alt-header-color);
      }

      /* ── Navbar subtitle ────────────────────────────────────── */
      .navbar-subtitle {
        font-size: .65em;
        opacity: .85;
        line-height: 1;
        margin-top: -1px;
        letter-spacing: .01em;
      }

      /* ── Dark mode surface overrides ────────────────────────── */
      @media (prefers-color-scheme: dark) {
        body { background-color: var(--pint-body-bg); color: var(--pint-text); --bs-body-color: var(--pint-text); --bs-body-bg: var(--pint-body-bg); }

        .card { background-color: var(--pint-surface); border-color: var(--pint-border); }

        code { color: var(--pint-code-color); background-color: var(--pint-code-bg); }

        .form-control, textarea.form-control {
          background-color: var(--pint-input-bg);
          border-color: var(--pint-input-border);
          color: var(--pint-text);
        }
        .form-control[readonly], textarea.form-control[readonly] {
          background-color: var(--pint-input-bg-ro);
        }
        .form-control:focus {
          background-color: var(--pint-input-bg);
          color: var(--pint-text);
          border-color: var(--bs-primary);
          box-shadow: 0 0 0 .25rem rgba(var(--bs-primary-rgb), .25);
        }

        .input-group > .btn-secondary {
          background-color: var(--pint-input-bg);
          border-color: var(--pint-input-border);
          color: var(--pint-text);
        }
        .input-group > .btn-secondary:hover { background-color: var(--pint-surface-raised); }

        .table {
          --bs-table-color:    var(--pint-text);
          --bs-table-bg:       transparent;
          --bs-table-border-color: var(--pint-border);
          --bs-table-hover-bg: rgba(255,255,255,.04);
          --bs-table-striped-bg: rgba(255,255,255,.04);
          color: var(--pint-text);
        }
        .table > :not(caption) > * > * { border-color: var(--pint-border); }
        .table > :not(:first-child) { border-top-color: var(--pint-border); }

        .modal-content { background-color: var(--pint-surface); color: var(--pint-text); border-color: var(--pint-border); }
        .modal-header, .modal-footer { border-color: var(--pint-border); }
        .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }

        .dropdown-menu { background-color: var(--pint-surface); border-color: var(--pint-border); }
        .dropdown-item { color: var(--pint-text); }
        .dropdown-item:hover, .dropdown-item:focus { background-color: var(--pint-surface-raised); color: var(--bs-white); }

        .alert-warning {
          background-color: rgba(var(--bs-warning-rgb), .1);
          border-color: rgba(var(--bs-warning-rgb), .25);
          color: var(--bs-warning);
        }

        hr { border-color: var(--pint-border); opacity: 1; }
        .text-muted { color: var(--pint-muted) !important; }
      }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-sm navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">
            <span class="mdi mdi-beer"></span> PINT
            <div class="navbar-subtitle">Pouring IPA for Network Trust</div>
        </a>
        {{if .Username}}
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarUser"
                aria-controls="navbarUser" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarUser">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link{{if eq .CurrentPath "/dashboard"}} active" aria-current="page{{end}}" href="/dashboard"><span class="mdi mdi-view-dashboard-outline"></span> Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link{{if eq .CurrentPath "/status"}} active" aria-current="page{{end}}" href="/status"><span class="mdi mdi-pulse"></span> Status</a>
                </li>
                {{if .IsRTP}}
                <li class="nav-item">
                    <a class="nav-link{{if eq .CurrentPath "/admin/radius"}} active" aria-current="page{{end}}" href="/admin/radius"><span class="mdi mdi-shield-account"></span> Admin</a>
                </li>
                {{end}}
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center" href="#"
                       id="navUserDropdown" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="{{.AvatarURL}}" class="rounded-circle me-2"
                             width="28" height="28" alt="{{.Username}}">
                        {{if .FullName}}{{.FullName}}{{else}}{{.Username}}{{end}}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navUserDropdown">
                        <li><a class="dropdown-item" href="/auth/logout">
                            <span class="mdi mdi-logout"></span> Logout
                        </a></li>
                    </ul>
                </li>
            </ul>
        </div>
        {{end}}
    </div>
</nav>
<div class="container mt-4 mb-5">
    {{block "content" .}}{{end}}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
{{block "scripts" .}}{{end}}
</body>
</html>
