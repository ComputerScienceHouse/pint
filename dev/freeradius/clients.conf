# PINT-managed clients are loaded from the pint-radius-config K8s Secret,
# which is mounted as a directory at /etc/freeradius/dynamic/.
# $-INCLUDE silently skips the file if the Secret doesn't exist yet
# (e.g. before the first user enrolls); FreeRADIUS will pick it up after
# PINT writes the Secret and sends SIGHUP.
$-INCLUDE /etc/freeradius/dynamic/clients.conf
