desc=CSH RadSec Server Certificate for FreeRADIUS (90-day)
visible=false
enable=true
enableBy=admin
name=pint_radsec_server
classId=caEnrollImpl
auth.instance_id=raCertAuth
authz.acl=group="Certificate Manager Agents" || group="Registration Manager Agents" || group="Subsystem Group" || group="Trusted Managers"
input.list=i1,i2
input.i1.class_id=certReqInputImpl
input.i2.class_id=submitterInfoInputImpl
output.list=o1
output.o1.class_id=certOutputImpl
policyset.list=radSecServerSet
policyset.radSecServerSet.list=1,2,3,4,5,6,7,8,9
policyset.radSecServerSet.1.constraint.class_id=subjectNameConstraintImpl
policyset.radSecServerSet.1.constraint.name=Subject Name Constraint
policyset.radSecServerSet.1.constraint.params.pattern=CN=[^,]+,O=CSH\.RIT\.EDU
policyset.radSecServerSet.1.constraint.params.accept=true
policyset.radSecServerSet.1.default.class_id=subjectNameDefaultImpl
policyset.radSecServerSet.1.default.name=Subject Name Default
policyset.radSecServerSet.1.default.params.name=CN=$request.req_subject_name.cn$,O=CSH.RIT.EDU
policyset.radSecServerSet.2.constraint.class_id=validityConstraintImpl
policyset.radSecServerSet.2.constraint.name=Validity Constraint
policyset.radSecServerSet.2.constraint.params.range=90
policyset.radSecServerSet.2.constraint.params.notBeforeCheck=false
policyset.radSecServerSet.2.constraint.params.notAfterCheck=false
policyset.radSecServerSet.2.default.class_id=validityDefaultImpl
policyset.radSecServerSet.2.default.name=Validity Default
policyset.radSecServerSet.2.default.params.range=90
policyset.radSecServerSet.2.default.params.startTime=0
policyset.radSecServerSet.3.constraint.class_id=keyConstraintImpl
policyset.radSecServerSet.3.constraint.name=Key Constraint
policyset.radSecServerSet.3.constraint.params.keyType=EC
policyset.radSecServerSet.3.constraint.params.keyParameters=secp256r1,secp384r1,secp521r1
policyset.radSecServerSet.3.default.class_id=userKeyDefaultImpl
policyset.radSecServerSet.3.default.name=Key Default
