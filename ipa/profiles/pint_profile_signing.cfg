desc=CSH Profile Signing Certificate for mobileconfig signing (1-year)
visible=false
enable=true
enableBy=admin
name=pint_profile_signing
classId=caEnrollImpl
auth.instance_id=raCertAuth
authz.acl=group="Certificate Manager Agents" || group="Registration Manager Agents" || group="Subsystem Group" || group="Trusted Managers"
input.list=i1,i2
input.i1.class_id=certReqInputImpl
input.i2.class_id=submitterInfoInputImpl
output.list=o1
output.o1.class_id=certOutputImpl
policyset.list=profileSigningSet
policyset.profileSigningSet.list=1,2,3,4,5,6,7,8
policyset.profileSigningSet.1.constraint.class_id=subjectNameConstraintImpl
policyset.profileSigningSet.1.constraint.name=Subject Name Constraint
policyset.profileSigningSet.1.constraint.params.pattern=CN=[^,]+,O=CSH\.RIT\.EDU
policyset.profileSigningSet.1.constraint.params.accept=true
policyset.profileSigningSet.1.default.class_id=subjectNameDefaultImpl
policyset.profileSigningSet.1.default.name=Subject Name Default
policyset.profileSigningSet.1.default.params.name=CN=$request.req_subject_name.cn$,O=CSH.RIT.EDU
policyset.profileSigningSet.2.constraint.class_id=validityConstraintImpl
policyset.profileSigningSet.2.constraint.name=Validity Constraint
policyset.profileSigningSet.2.constraint.params.range=365
policyset.profileSigningSet.2.constraint.params.notBeforeCheck=false
policyset.profileSigningSet.2.constraint.params.notAfterCheck=false
policyset.profileSigningSet.2.default.class_id=validityDefaultImpl
policyset.profileSigningSet.2.default.name=Validity Default
policyset.profileSigningSet.2.default.params.range=365
policyset.profileSigningSet.2.default.params.startTime=0
policyset.profileSigningSet.3.constraint.class_id=keyConstraintImpl
policyset.profileSigningSet.3.constraint.name=Key Constraint
policyset.profileSigningSet.3.constraint.params.keyType=EC
policyset.profileSigningSet.3.constraint.params.keyParameters=secp256r1,secp384r1,secp521r1
policyset.profileSigningSet.3.default.class_id=userKeyDefaultImpl
policyset.profileSigningSet.3.default.name=Key Default
policyset.profileSigningSet.4.constraint.class_id=noConstraintImpl
policyset.profileSigningSet.4.constraint.name=No Constraint
policyset.profileSigningSet.4.default.class_id=authorityKeyIdentifierExtDefaultImpl
policyset.profileSigningSet.4.default.name=Authority Key Identifier Default
policyset.profileSigningSet.5.constraint.class_id=noConstraintImpl
policyset.profileSigningSet.5.constraint.name=No Constraint
policyset.profileSigningSet.5.default.class_id=authInfoAccessExtDefaultImpl
policyset.profileSigningSet.5.default.name=AIA Extension Default
policyset.profileSigningSet.5.default.params.authInfoAccessADDdefaultMethods=false
policyset.profileSigningSet.5.default.params.authInfoAccessNumADs=0
policyset.profileSigningSet.6.constraint.class_id=keyUsageExtConstraintImpl
policyset.profileSigningSet.6.constraint.name=Key Usage Extension Constraint
policyset.profileSigningSet.6.constraint.params.keyUsageCritical=true
policyset.profileSigningSet.6.constraint.params.keyUsageDigitalSignature=true
policyset.profileSigningSet.6.constraint.params.keyUsageNonRepudiation=false
policyset.profileSigningSet.6.constraint.params.keyUsageDataEncipherment=false
policyset.profileSigningSet.6.constraint.params.keyUsageKeyEncipherment=false
policyset.profileSigningSet.6.constraint.params.keyUsageKeyAgreement=false
policyset.profileSigningSet.6.constraint.params.keyUsageKeyCertSign=false
policyset.profileSigningSet.6.constraint.params.keyUsageCrlSign=false
policyset.profileSigningSet.6.constraint.params.keyUsageEncipherOnly=false
policyset.profileSigningSet.6.constraint.params.keyUsageDecipherOnly=false
policyset.profileSigningSet.6.default.class_id=keyUsageExtDefaultImpl
policyset.profileSigningSet.6.default.name=Key Usage Default
policyset.profileSigningSet.6.default.params.keyUsageCritical=true
policyset.profileSigningSet.6.default.params.keyUsageDigitalSignature=true
policyset.profileSigningSet.6.default.params.keyUsageNonRepudiation=false
policyset.profileSigningSet.6.default.params.keyUsageDataEncipherment=false
policyset.profileSigningSet.6.default.params.keyUsageKeyEncipherment=false
policyset.profileSigningSet.6.default.params.keyUsageKeyAgreement=false
policyset.profileSigningSet.6.default.params.keyUsageKeyCertSign=false
policyset.profileSigningSet.6.default.params.keyUsageCrlSign=false
policyset.profileSigningSet.6.default.params.keyUsageEncipherOnly=false
policyset.profileSigningSet.6.default.params.keyUsageDecipherOnly=false
policyset.profileSigningSet.7.constraint.class_id=extendedKeyUsageExtConstraintImpl
policyset.profileSigningSet.7.constraint.name=Extended Key Usage Extension Constraint
policyset.profileSigningSet.7.constraint.params.exKeyUsageCritical=false
policyset.profileSigningSet.7.constraint.params.exKeyUsageOIDs=1.3.6.1.5.5.7.3.3
policyset.profileSigningSet.7.default.class_id=extendedKeyUsageExtDefaultImpl
policyset.profileSigningSet.7.default.name=Extended Key Usage Default
policyset.profileSigningSet.7.default.params.exKeyUsageCritical=false
policyset.profileSigningSet.7.default.params.exKeyUsageOIDs=1.3.6.1.5.5.7.3.3
policyset.profileSigningSet.8.constraint.class_id=signingAlgConstraintImpl
policyset.profileSigningSet.8.constraint.name=Signing Algorithm Constraint
policyset.profileSigningSet.8.constraint.params.signingAlgsAllowed=SHA256withRSA,SHA512withRSA,SHA256withEC,SHA384withEC,SHA512withEC
policyset.profileSigningSet.8.default.class_id=signingAlgDefaultImpl
policyset.profileSigningSet.8.default.name=Signing Algorithm Default
policyset.profileSigningSet.8.default.params.signingAlg=-
